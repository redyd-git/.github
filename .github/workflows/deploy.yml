name: Reusable Deploy

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      registry:
        required: false
        type: string
        default: "registry.redyd.dev"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Debug secrets
        run: |
          echo "User is set: ${{ secrets.REGISTRY_USER != '' }}"
          echo "Password is set: ${{ secrets.REGISTRY_PASSWORD != '' }}"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.registry }}/${{ inputs.image_name }}:latest
            ${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.ref_name }}
